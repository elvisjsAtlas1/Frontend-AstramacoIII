<header>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
</header>
<div class="login-container">

  <div class="login-card">

    <h2>Iniciar Sesión</h2>

    <div class="form-group">
      <label>Usuario</label>
      <div class="input-icon">
        <i class="fa fa-user"></i>
        <input [(ngModel)]="username" placeholder="Ingrese su usuario">
      </div>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-icon">
        <i class="fa fa-lock"></i>
        <input [(ngModel)]="password" type="password" placeholder="Ingrese su contraseña">
      </div>
    </div>

    <button (click)="login()">Ingresar</button>

  </div>

</div>
